  /v2/images/{image_id}/file:
    put:
      tags:
        - image-service
      summary: ISOイメージアップロード
      description: |-
        指定したイメージIDに対してISOイメージのバイナリデータをアップロードします。

        事前に `POST /v2/images` でイメージIDを発行してから本APIを呼び出してください。

        リクエストボディにISOファイルのバイナリデータを指定してください。
      operationId: image-service/upload-image
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - in: path
