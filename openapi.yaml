      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '204':
          description: >-
            The ISO image binary data has been uploaded successfully. The image status
            will transition to 'active' once processing is complete. No content is
            returned.

