components:
  responses:
    BadRequest:
      description: >-
        Some content in the request was invalid. Check the request body
        format, required fields, and parameter value types. The response
        body contains details about which field caused the error.
    Unauthorized:
      description: >-
        Authentication failed or token is missing. Ensure a valid
        X-Auth-Token is provided in the request header. Tokens expire
        after 24 hours — reissue via POST /v3/auth/tokens if expired.
    Forbidden:
      description: >-
        Policy does not allow current user to do this operation. The
        authenticated user lacks the required permissions or role for
        this action. Check sub-user role assignments if using a
        sub-user account.
    NotFound:
      description: >-
        The requested resource could not be found. Verify the resource
        UUID or name is correct and that the resource exists in the
        current project scope.
