openapi: 3.0.3
servers:
  - url: https://identity.c3j1.conoha.io
  - url: https://block-storage.c3j1.conoha.io
  - url: https://image-service.c3j1.conoha.io
  - url: https://compute.c3j1.conoha.io
  - url: https://networking.c3j1.conoha.io
  - url: https://lbaas.c3j1.conoha.io
  - url: https://object-storage.c3j1.conoha.io
  - url: https://dns-service.c3j1.conoha.io
info:
  description: |-
    ConoHa VPS Ver.3.0 の OpenAPI ドキュメントです

  version: '1.0'
  title: ConoHa VPS Ver.3.0 OpenAPI Spec
  termsOfService: 'https://www.conoha.jp/agreement/'
  contact:
    url: https://support.conoha.jp/

paths:
  /v3/auth/tokens:
    post:
      tags:
        - identity
      summary: APIユーザのトークン発行API
      description: |-
        ConoHa API を利用するために必要なトークンを発行します。

        現段階ではパスワード認証のみ対応しています。

        ユーザ・プロジェクトそれぞれに対して、IDまたは名前を指定してください。

        認証が成功した場合、レスポンスヘッダー内にトークンが入ります。

        有効期限は発行してから24時間となります。
      operationId: identity/issue-token
      security: []
      responses:
        '201':
          description: >-
            A new authentication token has been issued. The token string is returned in
            the X-Subject-Token response header. The body contains token metadata
            including expiration time, project scope, roles, and the service catalog.
            Tokens expire after 24 hours.
          headers:
            X-Subject-Token:
              schema:
                type: string
              description: generated token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueTokenRes'
        '400':
          $ref: '#/components/responses/BadRequest'
      parameters:
        - in: query
          name: nocatalog
          schema:
            type: string
          required: false
          description: (Since v3.1) The authentication response excludes the service catalog. By default, the response includes the service catalog.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueTokenReq'

  /v3/users/{user_id}/credentials/OS-EC2:
    get:
      tags:
        - identity
      summary: Credential 一覧
      description: Credential 取得
      operationId: identity/list-ec2-credentials
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: >-
            Returns a list of EC2-compatible credentials (access/secret key pairs) for
            the specified user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEc2CredentialsRes'
    post:
      tags:
        - identity
      summary: Credential 作成
      description: Credential 作成
      operationId: identity/create-ec2-credential
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEc2CredentialReq'
      responses:
        '201':
          description: >-
            A new EC2-compatible credential (access/secret key pair) has been created
            for the specified user. The response includes the generated access and
            secret keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEc2CredentialRes'
  /v3/users/{user_id}/credentials/OS-EC2/{credential_id}:
    get:
      tags:
        - identity
      summary: Credential 詳細
      description: Credential 詳細取得
      operationId: identity/get-ec2-credential
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - in: path
          name: credential_id
          schema:
            type: string
          required: true
          description: The UUID for the credential.
      responses:
        '200':
          description: >-
            Returns the details of a specific EC2-compatible credential, including the
            access key, secret key, project ID, and user ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowEc2CredentialRes'
    delete:
      tags:
        - identity
      summary: Credential 削除
      description: Credential 削除
      operationId: identity/delete-ec2-credential
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - in: path
          name: credential_id
          schema:
            type: string
          required: true
          description: The UUID for the credential.
      responses:
        '204':
          description: >-
            The EC2-compatible credential has been deleted. No content is returned.

  /v3/sub-users:
    get:
      tags:
        - role
      summary: サブユーザ一覧取得
      description: |-
        サブユーザの一覧を表示します。
      operationId: identity/list-sub-users
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            Returns a list of all sub-users in the project, including their IDs, names,
            and assigned roles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSubUsersRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - role
      summary: サブユーザ作成
      description: |-
        - サブユーザへのロール付与は必須
          - 1 つまたは複数のロール
        - ロールは id または name で指定する
        - パスワードは以下の制限がある
          - 9 文字以上 70 文字以下
          - 半角英小文字、半角英大文字、半角数字または記号、をそれぞれ 1 つ以上含む
          - 使用可能文字列
            - [a-zA-Z0-9] および記号
            - ! # $ % & ? " ' = + - _ { } [ ] ^ ~ : ; ( ) . , / | \ * @
      operationId: identity/create-sub-user
      security:
        - KeystoneTokenAuthentication: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubUserReq'
      responses:
        '200':
          description: >-
            The sub-user has been created with the specified roles. Returns the sub-user
            details including ID, name, and assigned roles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowSubUserRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: This operation conflicted with another operation on this resource.
  /v3/sub-users/{user_id}:
    get:
      tags:
        - role
      summary: サブユーザ詳細取得
      description: サブユーザの詳細取得
      operationId: identity/show-sub-user
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: >-
            Returns the details of the specified sub-user, including ID, name, and
            assigned roles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowSubUserRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      tags:
        - role
      summary: サブユーザ更新
      description: |-
        - パスワード変更
        - パスワードは以下の制限がある
          - 9 文字以上 70 文字以下
          - 半角英小文字、半角英大文字、半角数字または記号、をそれぞれ 1 つ以上含む
          - 使用可能文字列
            - [a-zA-Z0-9] および記号
            - ! # $ % & ? " ' = + - _ { } [ ] ^ ~ : ; ( ) . , / | \ * @
      operationId: identity/update-sub-user
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubUserReq'
      responses:
        '200':
          description: >-
            The sub-user has been updated (e.g., password changed). Returns the updated
            sub-user details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowSubUserRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags:
        - role
      summary: サブユーザ削除
      description: |-
        - ロールとの紐づけが解除される
          - ロールは消えない
      operationId: identity/delete-sub-user
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          description: >-
            The sub-user has been deleted. Associated role bindings are removed, but the
            roles themselves are not deleted. No content is returned.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v3/sub-users/{user_id}/assign:
    post:
      tags:
        - role
      summary: サブユーザにロール紐づけ
      description: |-
        - 記載されたロールが追加される
        - 記載されなかったロールは何もしない
      operationId: identity/assign-roles-to-sub-user
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRolesToSubUserReq'
      responses:
        '200':
          description: >-
            The specified roles have been assigned to the sub-user. Returns the updated
            sub-user details with all current role assignments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowSubUserRes'
  /v3/sub-users/{user_id}/unassign:
    post:
      tags:
        - role
      summary: サブユーザからロール紐づけ解除
      description: |-
        - 記載されたロールが紐づけ解除される
        - 記載されなかったロールは何もしない
        - 紐づくロールを 0 にできない
      operationId: identity/unassign-roles-from-sub-user
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRolesToSubUserReq'
      responses:
        '200':
          description: >-
            The specified roles have been unassigned from the sub-user. At least one
            role must remain assigned. Returns the updated sub-user details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowSubUserRes'
  /v3/permissions:
    get:
      tags:
        - role
      summary: パーミッション一覧取得
      description: |-
        - パーミッション名は `<httpMethod>`-`<resource>`-`[sub-resource]`-`[operation]`
          - sub-resource, operation は省略可能
          - 例:
            - get-server (サーバ詳細取得)
            - get-server-list (サーバ一覧)
      operationId: identity/list-permissions
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            Returns a list of all available permissions. Permission names follow the
            pattern `<httpMethod>-<resource>-[sub-resource]-[operation]` (e.g.,
            get-server, get-server-list).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPermissionsRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v3/sub-users/roles:
    get:
      tags:
        - role
      summary: ロール一覧取得
      description: ロールの一覧を取得します。
      operationId: identity/list-roles
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            Returns a list of all custom roles in the project, including their IDs,
            names, and assigned permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRolesRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - role
      summary: ロール作成
      description: |-
        - ロール作成時にパーミッション付与は必須
          - １つまたは複数のパーミッション
        - パーミッションは name で指定する
        - ロール名に使える文字列は `^[a-zA-Z0-9_-]{1,32}$`
      operationId: identity/create-role
      security:
        - KeystoneTokenAuthentication: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleReq'
      responses:
        '200':
          description: >-
            The role has been created with the specified permissions. Returns the role
            details including ID, name, and assigned permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowRoleRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: This operation conflicted with another operation on this resource.
  /v3/sub-users/roles/{role_id}:
    get:
      tags:
        - role
      summary: ロール詳細取得
      description: ロールの詳細を取得します。
      operationId: identity/show-role
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '200':
          description: >-
            Returns the details of the specified role, including ID, name, and assigned
            permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowRoleRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - role
      summary: ロール更新
      description: |-
        - ロール名も変更可能
          - ロール名に使える文字列は `^[a-zA-Z0-9_-]{1,32}$`
      operationId: identity/update-role
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleReq'
      responses:
        '200':
          description: >-
            The role has been updated (name and/or permissions changed). Returns the
            updated role details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowRoleRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - role
      summary: ロール削除
      description: |-
        - パーミッションとの紐づけが解除される
          - パーミッションは消えない
        - サブユーザにこのロールのみ紐づいている場合、削除できない
      operationId: identity/delete-role
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '204':
          description: >-
            The role has been deleted. Permission bindings are removed, but the
            permissions themselves are not deleted. Cannot delete a role if it is the
            only role assigned to a sub-user. No content is returned.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v3/sub-users/roles/{role_id}/assign:
    post:
      tags:
        - role
      summary: ロールにパーミッションを紐づけ
      description: |-
        - 記載されたパーミッションが紐づく
        - 記載されなかったパーミッションは何もしない
      operationId: identity/assign-permissions-to-role
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignPermissionsToRole'
      responses:
        '200':
          description: >-
            The specified permissions have been assigned to the role. Returns the
            updated role details with all current permission assignments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowRoleRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v3/sub-users/roles/{role_id}/unassign:
    post:
      tags:
        - role
      summary: ロールからパーミッションを紐づけ解除
      description: |-
        - 記載されたパーミッションが紐づけ解除される
        - 記載されなかったパーミッションは何もしない
        - 紐づけ解除された結果パーミッションを 0 にできない
      operationId: identity/unassign-permissions-from-role
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignPermissionsToRole'
      responses:
        '200':
          description: >-
            The specified permissions have been unassigned from the role. At least one
            permission must remain assigned. Returns the updated role details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowRoleRes'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v3/{project_id}/types:
    get:
      tags:
        - block-storage
      summary: ボリュームタイプ一覧取得
      description: |-
        ボリュームタイプの一覧を取得します。
      operationId: block-storage/list-volume-types
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            Returns a list of available volume types. Key types: c3j1-ds02-boot (for
            boot disks) and c3j1-ds02-add (for additional disks).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListVolumeTypesRes'
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: query
          name: is_public
          schema:
            type: boolean
          required: false
          description: Filter the volume type by public visibility.
        - $ref: '#/components/parameters/SortQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/MarkerQuery'
  /v3/{project_id}/types/{volume_type_id}:
    get:
      tags:
        - block-storage
      summary: ボリュームタイプ取得 (アイテム指定)
      description: Shows details for a volume type.
      operationId: block-storage/show-volume-type
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            Returns the details of a specific volume type, including name, description,
            and extra specs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowVolumeTypeRes'
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: volume_type_id
          schema:
            type: string
          required: true
          description: The UUID for an existing volume type.
  /v3/{project_id}/volumes/detail:
    get:
      tags:
        - block-storage
      summary: ボリューム詳細一覧取得
      description: |-
        アクセス可能なボリュームのリストと詳細を取得します。
      operationId: block-storage/list-volumes-detail
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            Returns a detailed list of all volumes in the project, including status
            (available, in-use, creating, deleting, error), size, volume_type, attached
            server info, and metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListVolumesDetailRes'
        '400':
          $ref: '#/components/responses/BadRequest'
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/SortQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/MarkerQuery'
        - in: query
          name: with_count
          schema:
            type: boolean
          required: false
          description: "Whether to show count in API response or not, default is False. New in version 3.45"
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: Filters the response by a name, as a string.
        - in: query
          name: status
          schema:
            type: string
          required: false
          description: Filters the response by a volume status.
        - in: query
          name: metadata
          schema:
            type: string
          required: false
          description: Filters the response by a metadata key and value pair.
  /v3/{project_id}/volumes:
    get:
      tags:
        - block-storage
      summary: ボリューム一覧取得
      description: |-
        ボリューム一覧を取得します。
      operationId: block-storage/list-volumes
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            Returns a summary list of all volumes in the project, including IDs and
            names. Use /v3/{project_id}/volumes/detail for full details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListVolumesRes'
        '400':
          $ref: '#/components/responses/BadRequest'
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/SortQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/MarkerQuery'
        - in: query
          name: with_count
          schema:
            type: boolean
          required: false
          description: "Whether to show count in API response or not, default is False. New in version 3.45"
    post:
      tags:
        - block-storage
      summary: ボリューム作成
      description: |-
        ボリューム作成API

        * ブートストレージ用のボリューム(以下、ブートボリューム) 作成時において、imageRef の指定が必須になります。
        * ブートボリューム作成時において、size の指定はメモリ512MBプランのものであれば 30、メモリ512MBプラン以外のものであれば 100、200、500 から指定できます。
        * 追加ストレージ用のボリューム(以下、追加ボリューム) 作成時において、size の指定は 200、500、1000、5000、10000 から指定できます。
        * 追加ボリューム作成時において、imageRef の指定はイメージ保存元が追加ボリュームのイメージのみ指定できます。
        * ボリュームの複製時において、size および volume_type は複製元と同じ値を指定する必要があります。
        * バックアップからのボリューム作成時において、volume_type はバックアップ元と同じ値を指定する必要があります。また、バックアップ元より小さい size は指定できません。
        * ブートボリュームはサーバにアタッチしてご利用ください。アタッチされていないブートボリュームは2個までに制限されています。上限に到達した際は、削除またはサーバへのアタッチをお願いします。
        * ボリュームを複製する場合は source_volid に複製したいボリュームIDを指定します。source_volid を指定する際、imageRef は必要ありません。
        * バックアップから新規ボリュームを作成する場合は backup_id を指定します。backup_id を指定する際、imageRef は必要ありません。
        * volume_type はボリュームタイプのIDまたは名前を指定することができます
          * volume_type は未指定にすることも可能ですが ConoHa 側で指定されるデフォルトの volume_type が自動指定されますのでご注意ください
          * 指定する volume_type は以下のように選択してください
          * c3j1-ds02-boot
            * ブートボリュームを作成する際に使うボリュームタイプです
          * c3j1-ds02-add
            * 追加ボリュームを作成する際に使うボリュームタイプです

      operationId: block-storage/create-volume
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '202':
          description: >-
            The volume creation request has been accepted and is being processed
            asynchronously. Poll GET /v3/{project_id}/volumes/{volume_id} to check
            status transition (creating -> available). For boot volumes, imageRef is
            required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateVolumeRes'
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVolumeReq'
  /v3/{project_id}/volumes/{volume_id}:
    get:
      tags:
        - block-storage
      summary: ボリューム詳細取得 (アイテム指定)
      description: |-
        指定したボリュームの詳細を取得します。
      operationId: block-storage/show-volume
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            Returns the details of a specific volume, including status, size,
            volume_type, attachments, creation time, and metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowVolumeRes'
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/VolumeIdPath'
    put:
      tags:
        - block-storage
      summary: ボリューム更新
      description: |-
        ボリュームの名前を変更することができます。
      operationId: block-storage/update-volume
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            The volume name has been updated. Returns the updated volume details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowVolumeRes'
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: volume_id
          schema:
            type: string
          required: true
          description: The UUID of the volume.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVolumeReq'
    delete:
      tags:
        - block-storage
      summary: ボリューム削除
      description: |-
        ボリュームを削除します。

        スナップショットを保持していたり、マイグレーション中のボリュームは削除できません。
      operationId: block-storage/delete-volume
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '202':
          description: >-
            The volume deletion request has been accepted and is being processed
            asynchronously. Volumes with snapshots or in migration cannot be deleted.
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: volume_id
          schema:
            type: string
          required: true
          description: The UUID of the volume.
        - in: query
          name: cascade
          schema:
            type: boolean
          required: false
          description: Remove any snapshots along with the volume. Default=False.
        - in: query
          name: force
          schema:
            type: boolean
          required: false
          description: "Indicates whether to force delete a volume even if the volume is in deleting or error_deleting. Default is false.New in version 3.23"
  /v3/{project_id}/volumes/{volume_id}/action:
    post:
      tags:
        - block-storage
      summary: ボリュームのイメージ保存
      description: |-
        1. ボリュームのイメージ保存API
          * 1TB以上のサイズのボリュームはイメージ保存できませんのでご注意ください
          * ボリュームがサーバにアタッチされている場合、そのサーバは停止中である必要があります
          * イメージ保存領域を超過している場合はイメージ保存を実行してもイメージは完成しません。イメージ保存領域を購入してから再実行してください。
      operationId: block-storage/volume-actions
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/VolumeIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/VolUploadImageReq'
      responses:
        '202':
          description: >-
            The volume action (e.g., upload-to-image) has been accepted and is being
            processed asynchronously. Note: volumes over 1TB cannot be saved as images,
            and attached volumes require the server to be stopped.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolUploadImageRes'
  /v3/{project_id}/backups:
    get:
      tags:
        - block-storage
      summary: バックアップ一覧取得API
      description: |-
        自動バックアップで出来上がったバックアップ一覧取得を行います。
      operationId: block-storage/list-backups
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/SortQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: >-
            Returns a list of automatic backups, including backup IDs, volume IDs, and
            status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBackupsRes'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - block-storage
      summary: 自動バックアップ申込み
      description: |-
        自動バックアップ申込みAPI   
        指定したinstanceに追加ボリュームがアタッチされている場合は、ブートボリュームに加えて追加ボリュームもバックアップ対象になります。

        日次バックアップを申し込む場合は schedule: daily を指定してください  
        schedule の指定がない場合、週次バックアップ申し込みとなります

        retention はデフォルトで 14 です  
        14 以上 30 以下の値を指定できます
      operationId: block-storage/apply-backup
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '201':
          description: >-
            The automatic backup subscription has been created. If the instance has
            additional volumes attached, both boot and additional disks will be backed
            up. Returns backup configuration details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyBackupRes'
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyBackupReq'
  /v3/{project_id}/backups/detail:
    get:
      tags:
        - block-storage
      summary: バックアップ詳細一覧取得
      description: |-
        バックアップ詳細一覧取得を行います。
      operationId: block-storage/list-backups-details
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/SortQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: >-
            Returns a detailed list of all backups, including status, size, volume ID,
            creation time, and availability zone.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBackupsDetailRes'
        '404':
          $ref: '#/components/responses/NotFound'
  /v3/{project_id}/backups/{backup_id}:
    get:
      tags:
        - block-storage
      summary: バックアップ詳細取得API
      description: |-
        バックアップ詳細取得を行います。
      operationId: block-storage/show-backup
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: backup_id
          schema:
            type: string
          required: true
          description: The ID of the backup.
      responses:
        '200':
          description: >-
            Returns the details of a specific backup, including status, size, volume ID,
            and creation time.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowBackupRes'
        '404':
          $ref: '#/components/responses/NotFound'

  /v3/{project_id}/backups/{backup_id}/restore:
    post:
      tags:
        - block-storage
      summary: バックアップリストア
      description: |-
        - リストア対象がブートボリュームの場合は、サーバは停止中である必要があります
        - リストア対象が追加ボリュームの場合は、サーバは停止中またはデタッチ状態である必要があります
        - バックアップ元のボリュームと、リストア先のボリュームは同じである必要はありません

      operationId: block-storage/restore-backup
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '202':
          description: >-
            The backup restore has been accepted and is being processed asynchronously.
            For boot disk restores, the server must be stopped. For additional disk
            restores, the server must be stopped or the disk must be detached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestoreBackupRes'
        '400':
          $ref: '#/components/responses/BadRequest'
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: backup_id
          schema:
            type: string
          required: true
          description: The ID of the backup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreBackupReq'
  /v3/{project_id}/backups/{instance_uuid}:
    put:
      tags:
        - block-storage
      summary: バックアップ保存世代数更新
      description: |-
        日次バックアップの保存世代数を変更します. retention には 14 以上 30 以下の値を指定可能です.
        この API を実行するには日次バックアップを契約する必要があります
      operationId: block-storage/update-backup
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: instance_uuid
          schema:
            type: string
          required: true
          description: The ID of the instance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBackupReq'
      responses:
        '200':
          description: >-
            The daily backup retention count has been updated. Returns the updated
            backup configuration. Retention must be between 14 and 30.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateBackupRes'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - block-storage
      summary: 自動バックアップ解約
      description: |-
        週次、日次どちらも申し込んでいる場合、どちらも解約されます  
        バックアップデータは削除されないため、必要であれば再度申し込みをしてください

      operationId: block-storage/cancel-backup
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '204':
          description: >-
            The automatic backup subscription has been cancelled (both weekly and
            daily). Existing backup data is NOT deleted. No content is returned.
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: instance_uuid
          schema:
            type: string
          required: true
          description: The ID of the instance.

  /v2/images:
    get:
      tags:
        - image-service
      summary: イメージ一覧取得
      description:  |-
        パブリック及び対象ユーザでのみ利用可能なプライベートイメージの一覧を取得します。
      operationId: image-service/list-images
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            Returns a list of available images (both public and private), including
            image ID, name, status, size, os_type, visibility, and metadata. Supports
            filtering by name, status, visibility, os_type, and more.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListImagesRes'
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/MarkerQuery'
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: Filters the response by a name, as a string. A valid value is the name of an image.
        - in: query
          name: owner
          schema:
            type: string
          required: false
          description: Filters the response by a project (also called a “tenant”) ID. Shows only images that are shared with you by the specified owner.
        - in: query
          name: protected
          schema:
            type: boolean
          required: false
          description: Filters the response by the ‘protected’ image property. A valid value is one of ‘true’, ‘false’ (must be all lowercase). Any other value will result in a 400 response.
        - in: query
          name: status
          schema:
            type: string
          required: false
          description: Filters the response by an image status.
        - in: query
          name: visibility
          schema:
            type: string
          required: false
          description: Filters the response by an image visibility value. A valid value is public, private, community, shared, or all. (Note that if you filter on shared, the images included in the response will only be those where your member status is accepted unless you explicitly include a member_status filter in the request.) If you omit this parameter, the response shows public, private, and those shared images with a member status of accepted.
        - in: query
          name: os_hidden
          schema:
            type: boolean
          required: false
          description: When true, filters the response to display only “hidden” images. By default, “hidden” images are not included in the image-list response. (Since Image API v2.7)
        - in: query
          name: member_status
          schema:
            type: string
          required: false
          description: Filters the response by a member status. A valid value is accepted, pending, rejected, or all. Default is accepted.
        - in: query
          name: size_max
          schema:
            type: string
          required: false
          description: Filters the response by a maximum image size, in bytes.
        - in: query
          name: size_min
          schema:
            type: string
          required: false
          description: Filters the response by a minimum image size, in bytes.
        - in: query
          name: os_type
          schema:
            type: string
          required: false
          description: Filters the response by a os_type.
        - in: query
          name: created_at
          schema:
            type: string
          required: false
          description: |-
            Specify a comparison filter based on the date and time when the resource was created. (See Time Comparison Filters).

            The date and time stamp format is ISO 8601:

            CCYY-MM-DDThh:mm:ss±hh:mm

            The ±hh:mm value, if included, is the time zone as an offset from UTC.

            For example, 2015-08-27T09:49:58-05:00.

            If you omit the time zone, the UTC time zone is assumed.
        - in: query
          name: updated_at
          schema:
            type: string
          required: false
          description: |-
            Specify a comparison filter based on the date and time when the resource was most recently modified. (See Time Comparison Filters).

            The date and time stamp format is ISO 8601:

            CCYY-MM-DDThh:mm:ss±hh:mm

            The ±hh:mm value, if included, is the time zone as an offset from UTC.

            For example, 2015-08-27T09:49:58-05:00.

            If you omit the time zone, the UTC time zone is assumed.
        - in: query
          name: sort_dir
          schema:
            type: string
          required: false
          description: Sorts the response by a set of one or more sort direction and attribute (sort_key) combinations. A valid value for the sort direction is asc (ascending) or desc (descending). If you omit the sort direction in a set, the default is desc.
        - in: query
          name: sort_key
          schema:
            type: string
          required: false
          description: Sorts the response by an attribute, such as name, id, or updated_at. Default is created_at. The API uses the natural sorting direction of the sort_key image attribute.
        - in: query
          name: sort
          schema:
            type: string
          required: false
          description: |-
            Sorts the response by one or more attribute and sort direction combinations. You can also set multiple sort keys and directions. Default direction is desc.

            Use the comma (,) character to separate multiple values. For example:

            GET /v2/images?sort=name:asc,status:desc
    post:
      tags:
        - image-service
      summary: ISOイメージ作成
      description:  |-
        ISOイメージをアップロードする際に利用します。

        本APIでイメージIDが発行されます。
        ISOイメージを利用するには次にISOイメージアップロードAPIにて、バイナリデータをアップロードしてください。
        ISOイメージアップロードAPIの詳細は https://doc.conoha.jp/reference/api-vps3/api-image-vps3/image-upload_iso_image-v3/?btn_id=reference-api-vps3--sidebar_reference-image-upload_iso_image-v3 をご参照ください。

        disk_format は `iso` のみ指定可能です。
      operationId: image-service/create-images
      security:
        - KeystoneTokenAuthentication: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageReq'
      responses:
        '200':
          description: >-
            The ISO image record has been created with a new image ID. Next, upload the
            binary data via PUT /v2/images/{image_id}/file. Only disk_format=iso is
            supported.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesBody'
  /v2/images/{image_id}:
    get:
      tags:
        - image-service
