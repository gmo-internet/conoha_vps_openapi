      description: 指定したイメージの詳細を取得します。
      operationId: image-service/show-image
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            Returns the details of a specific image, including name, status, size,
            disk_format, container_format, visibility, os_type, and metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesBody'
      parameters:
