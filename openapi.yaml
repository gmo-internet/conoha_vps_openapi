        * name は ConoHa サービス内で指定するため入力できません
        * 初期構築中及び処理中のサーバは削除できません
        * セキュリティグループは名前・IDどちらでも指定することができます。
          * 名前の場合: "security_groups": [{"name": "security_group_name"}]
          * IDの場合: "security_groups": ["security_group_id"]
      operationId: compute/create-server
      security:
        - KeystoneTokenAuthentication: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServerReq'
      responses:
        '202':
          description: >-
            The server creation request has been accepted and is being processed
            asynchronously. A boot volume must be created first via the Block Storage
            API. Poll GET /v2.1/servers/{server_id} to check status transition (BUILD ->
            ACTIVE).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateServerRes'
  /v2.1/servers/detail:
    get:
      tags:
        - compute
      summary: サーバ一覧詳細取得
      description: |-
        各サーバについて、ネットワーク、ボリューム、およびサーバ使用情報を含むサーバの詳細を表示します。

      operationId: compute/list-servers-details
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            Returns a detailed list of all servers in the project, including status
            (ACTIVE, SHUTOFF, BUILD, ERROR, VERIFY_RESIZE, RESCUE, etc.), flavor, image,
            attached volumes, network addresses, and metadata. Use this to check current
            server state before performing actions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListServersDetailsRes'
  /v2.1/servers/{server_id}:
    get:
      tags:
        - compute
      summary: 詳細取得 (アイテム指定)
      description: |-
        サーバの詳細を表示します。

      operationId: compute/show-server
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ServerIdPath'
      responses:
        '200':
          description: >-
            Returns the full details of a specific server, including status, flavor,
            attached volumes, network addresses (IPv4/IPv6), security groups, metadata,
            and creation time.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowServerRes'
    delete:
      tags:
        - compute
      summary: サーバ削除
      description: |-
        サーバを削除します
      operationId: compute/delete-server
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ServerIdPath'
      responses:
        '204':
          description: >-
            The server has been deleted. Servers in initial build or processing state
            cannot be deleted. No content is returned.
  /v2.1/servers/{server_id}/ips:
    get:
      tags:
        - compute
      summary: サーバに紐づくIPアドレス一覧取得
      description: |-
        サーバに割り当てられているIPアドレスを一覧表示します。
      operationId: compute/list-ips
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ServerIdPath'
      responses:
        '200':
          description: >-
            Returns all IP addresses assigned to the server, grouped by network name.
            Includes both IPv4 and IPv6 addresses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListIpsRes'
  /v2.1/servers/{server_id}/ips/{network_label}:
    get:
      tags:
        - compute
      summary: サーバに紐づくIPアドレス一覧取得(ネットワーク名指定)
      description: |-
        サーバに紐づくIPアドレスのうち、指定したネットワークラベル(ネットワーク名)のみの詳細を表示します。

      operationId: compute/show-ip-details
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ServerIdPath'
        - in: path
          name: network_label
          schema:
            type: string
          required: true
          description: ネットワーク名
      responses:
        '200':
          description: >-
            Returns the IP addresses assigned to the server for the specified network
            label (network name), including IP version and address.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowIpsDetailsRes'
  /v2.1/servers/{server_id}/os-security-groups:
    get:
      tags:
        - compute
      summary: サーバに紐づくセキュリティグループ一覧取得
      description: |-
        セキュリティグループのサーバへの割り当て状態を確認することが出来ます。
      operationId: compute/list-security-groups-server
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ServerIdPath'
      responses:
        '200':
          description: >-
            Returns a list of security groups assigned to the specified server,
            including group IDs, names, and their associated rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSecurityGroupsServerRes'
  /v2.1/servers/{server_id}/remote-consoles:
    post:
      tags:
        - compute
      summary: コンソールURL取得
      description: |-
        コンソール接続の際に用いる、一時的なコンソール接続用URLを取得します。

        VNCコンソール、シリアルコンソール、webシリアルコンソールのURLを生成することができます。

        起動中のサーバーのみ利用可能です。停止状態の場合はサーバーを起動してから実行してください。

        各コンソールのprotocolとtypeの組み合わせは以下になります

        | console    | protocol | type   |
        | ---------- | -------- | ------ |
        | vnc        | vnc      | novnc  |
        | serial     | serial   | serial |
        | web serial | web      | serial |

      operationId: compute/create-console
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ServerIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/CreateVNCConsoleReq'
                - $ref: '#/components/schemas/CreateSerialConsoleReq'
                - $ref: '#/components/schemas/CreateWEBConsoleReq'
      responses:
        '200':
          description: >-
            Returns a temporary console URL for the server. Supported console types: VNC
            (protocol=vnc, type=novnc), serial (protocol=serial, type=serial), and web
            serial (protocol=web, type=serial). The server must be in ACTIVE state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConsoleRes'
  /v2.1/servers/{server_id}/rrd/cpu:
    get:
      tags:
        - compute
      summary: サーバ利用状況グラフ取得 (CPU使用時間)
      description: |-
        サーバのCPU使用時間をrrd形式で取得します。

        一秒間に 「1 CPU が占有された時間 × Core 数」を nano second 単位で出力します。

        * 1Core の場合、最大で 1,000,000,000 nsec
        * 2Core の場合、最大で 2,000,000,000 nsec

      operationId: compute/get-cpu-utilization-graph
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ServerIdPath'
        - in: query
          name: start_date_raw
          schema:
            type: string
          required: false
          description: Data acquisition start time (default:1day ago)
        - in: query
          name: end_date_raw
          schema:
            type: string
          required: false
          description: Data acquisition end time (default:current time)
        - in: query
          name: mode
          schema:
            type: string
          required: false
          description: Data binding method ({average,max,min} default:average)
      responses:
        '200':
          description: >-
            Returns CPU utilization data in RRD format. Values are in nanoseconds per
            second per core (e.g., max 1,000,000,000 for 1 core, 2,000,000,000 for 2
            cores).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCpuUtilizationGraphRes'
  /v2.1/servers/{server_id}/rrd/interface:
    get:
      tags:
        - compute
      summary: サーバ利用状況グラフ取得 (インターフェイストラフィック)
      description: |-
        サーバにアタッチされたポートのトラフィック情報をrrd形式で取得します。

        単位は B/s(Byte/second) です。

      operationId: compute/get-interface-traffic-graph
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ServerIdPath'
        - in: query
          name: port_id
          schema:
            type: string
          required: true
          description: The Port ID
        - in: query
          name: start_date_raw
          schema:
            type: string
          required: false
          description: Data acquisition start time (default:1day ago)
        - in: query
          name: end_date_raw
          schema:
            type: string
          required: false
          description: Data acquisition end time (default:current time)
        - in: query
          name: mode
          schema:
            type: string
          required: false
          description: Data binding method ({average,max,min} default:average)
      responses:
        '200':
          description: >-
            Returns network interface traffic data in RRD format for the specified port.
            Values are in B/s (bytes per second).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetInterfaceTrafficGraphRes'
  /v2.1/servers/{server_id}/rrd/disk:
    get:
      tags:
        - compute
      summary: サーバ利用状況グラフ取得 (ディスクIO)
      description: |-
        サーバにアタッチされたボリュームのIO情報をrrd形式で取得します。

        単位は B/s(Byte/second) です。

      operationId: compute/get-disk-io-graph
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ServerIdPath'
        - in: query
          name: device
          schema:
            type: string
          required: false
          description: The disk device name ({vda,vdb,etc} default:vda)
        - in: query
          name: start_date_raw
          schema:
            type: string
          required: false
          description: Data acquisition start time (default:1day ago)
        - in: query
          name: end_date_raw
          schema:
            type: string
          required: false
          description: Data acquisition end time (default:current time)
        - in: query
          name: mode
          schema:
            type: string
          required: false
          description: Data binding method ({average,max,min} default:average)
      responses:
        '200':
          description: >-
            Returns disk I/O data in RRD format for the specified device (default: vda).
            Values are in B/s (bytes per second).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDiskIOGraphRes'
  /v2.1/startup-scripts:
    get:
      tags:
        - compute
      summary: スタートアップスクリプト一覧取得 (GMO)
      description: |-
        スタートアップスクリプトのテンプレート一覧を取得します

        指定したトークンのサービスタイプに応じたスタートアップスクリプトが返却されます

      operationId: compute/list-startup-scripts
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '200':
          description: >-
            Returns a list of available startup script templates for the account's
            service type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStartupScriptsRes'
        '404':
          $ref: '#/components/responses/NotFound'
  /v2.0/networks:
    post:
      tags:
        - network
      summary: ネットワーク作成 (ローカルネットワーク用)
      description: |-
        ローカルネットワークを作成します。

        リクエストボディは不要です。

        ローカルネットワークの作成は1つのアカウントに対して10個までに制限されています。

      operationId: network/create-networks
      security:
        - KeystoneTokenAuthentication: []
      responses:
        '201':
          description: >-
            A new local network has been created. Maximum 10 local networks per account.
            Returns the network details including ID, name, status, and subnets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowNetworkRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags:
        - network
      summary: ネットワーク一覧取得
      description: |-
        ネットワーク一覧を取得します。
      operationId: network/list-networks
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - in: query
          name: id
          schema:
            type: string
          required: false
          description: Filter the list result by the ID of the resource.
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: Filter the list result by the human-readable name of the resource.
        - in: query
          name: status
          schema:
            type: string
          required: false
          description: Filter the network list result by network status. Values are ACTIVE, DOWN, BUILD or ERROR.
        - in: query
          name: tenant_id
          schema:
            type: string
          required: false
          description: Filter the list result by the ID of the project that owns the resource.
        - in: query
          name: project_id
          schema:
            type: string
          required: false
          description: Filter the list result by the ID of the project that owns the resource.
        - in: query
          name: shared
          schema:
            type: boolean
          required: false
          description: Filter the network list result based on if the network is shared across all tenants.
        - in: query
          name: fields
          schema:
            type: string
          required: false
          description: By using fields parameter, the API returns only the requested set of attributes. e.g. fields=id&fields=name
      responses:
        '200':
          description: >-
            Returns a list of all networks accessible to the project, including external
            networks, local networks, and shared networks. Each entry includes network
            ID, name, status, subnets, and shared flag.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListNetworksRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v2.0/networks/{network_id}:
    get:
      tags:
        - network
      summary: ネットワーク詳細取得(アイテム指定)
      description: |-
        指定したネットワークIDのネットワーク詳細を取得します。

        queryに"fields"を指定してレスポンス内容をフィルタリング可能です。
      operationId: network/show-network
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - in: path
          name: network_id
          schema:
            type: string
          required: true
          description: The UUID of the network.
        - in: query
          name: fields
          schema:
            type: string
          required: false
          description: By using fields parameter, the API returns only the requested set of attributes. e.g. fields=id&fields=name
      responses:
        '200':
          description: >-
            Returns the details of a specific network, including ID, name, status,
            subnets, admin_state_up, and shared flag.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowNetworkRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags:
        - network
      summary: ネットワーク削除 (ローカルネットワーク用)
      description: |-
        ローカルネットワークのみ削除することができます。

        ネットワークを削除するには、紐づくサブネットやポートを先に削除する必要があります。

      operationId: network/delete-network
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - in: path
          name: network_id
          schema:
            type: string
          required: true
          description: The UUID of the network.
      responses:
        '204':
          description: >-
            The local network has been deleted. Only local networks can be deleted. All
            associated subnets and ports must be deleted first. No content is returned.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v2.0/allocateips:
    post:
      tags:
        - network
      summary: ポート作成 (追加IP用)
      description: |-
        追加IPアドレス用ポートを作成することが出来ます。

        "count" には追加したいIPの個数を指定します。 1 ~ 16 まで指定が可能です。

        追加するIPの個数が多いほどIPアドレス使用料が上昇します。また、不正利用防止の為**30日間解約できません**のでご注意ください。

      operationId: network/create-additional-port
      security:
        - KeystoneTokenAuthentication: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdditionalPortReq'
      responses:
        '201':
          description: >-
            Additional IP address port(s) have been created. The count parameter
            specifies 1-16 IPs. Note: additional IPs cannot be cancelled for 30 days.
            Returns the port details including allocated IP addresses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v2.0/ports:
    post:
      tags:
        - network
      summary: ポート作成 (ローカルネットワーク用)
      description: |-
        ローカルネットワークのポート作成時に利用します。

        ポート作成のためには事前にサブネットの作成が必要となります。未作成の場合は"サブネット作成 (ローカルネットワーク用)API"にてサブネットを作成してからポート作成を実行してください。

        Externalネットワークや追加IP用のポートを作成することはできません。

        事前に作成したネットワークの network_id は必ず指定する必要があり、他のパラメータは任意指定です。

      operationId: network/create-port
      security:
        - KeystoneTokenAuthentication: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePortReq'
      responses:
        '201':
          description: >-
            A new port has been created on the local network. A subnet must exist on the
            network before creating ports. Returns the port details including ID, MAC
            address, fixed IPs, and security groups.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags:
        - network
      summary: ポート一覧取得
      description: |-
        ポート一覧を取得します。

        queryを利用して様々なフィルタリングが可能です。
      operationId: network/list-ports
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - name: admin_state_up
          in: query
          required: false
          schema:
            type: boolean
          description: Filter the list result by the administrative state of the resource, which is up (true) or down (false).
        - name: description
          in: query
          required: false
          schema:
            type: string
          description: Filter the list result by the human-readable description of the resource.
        - name: device_id
          in: query
          required: false
          schema:
            type: string
          description: Filter the port list result by the ID of the device that uses this port. For example, a server instance or a logical router.
        - name: device_owner
          in: query
          required: false
          schema:
            type: string
          description: Filter the port result list by the entity type that uses this port. For example, compute:nova (server instance), network:dhcp (DHCP agent) or network:router_interface (router interface).
        - name: fixed_ips
          in: query
          required: false
          schema:
            type: string
          description: Filter the port list result by the IP addresses for the port. This field has one or multiple entries. Each entry consists of IP address (ip_address), IP address substring (ip_address_substr) and/or the subnet ID from which the IP address is assigned (subnet_id).
        - name: id
          in: query
          required: false
          schema:
            type: string
          description: Filter the list result by the ID of the resource.
        - name: mac_address
          in: query
          required: false
          schema:
            type: string
          description: Filter the port list result by the MAC address of the port.
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Filter the list result by the human-readable name of the resource.
        - name: network_id
          in: query
          required: false
          schema:
            type: string
          description: Filter the list result by the ID of the attached network.
        - name: project_id
          in: query
          required: false
          schema:
            type: string
          description: Filter the list result by the ID of the project that owns the resource.
        - name: revision_number
          in: query
          required: false
          schema:
            type: integer
          description: Filter the list result by the revision number of the resource.
        - name: sort_dir
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
          description: Sort direction. A valid value is asc (ascending) or desc (descending). You can specify multiple pairs of sort key and sort direction query parameters.
        - name: sort_key
          in: query
          required: false
          schema:
            type: string
          description: Sorts by a port attribute. You can specify multiple pairs of sort key and sort direction query parameters.
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ACTIVE, DOWN, BUILD, ERROR]
          description: Filter the port list result by the port status. Values are ACTIVE, DOWN, BUILD and ERROR.
        - name: tenant_id
          in: query
          required: false
          schema:
            type: string
          description: Filter the list result by the ID of the project that owns the resource.
        - name: tags
          in: query
          required: false
          schema:
            type: string
          description: A list of tags to filter the list result by. Resources that match all tags in this list will be returned. Tags in query must be separated by comma.
        - name: tags-any
          in: query
          required: false
          schema:
            type: string
          description: A list of tags to filter the list result by. Resources that match any tag in this list will be returned. Tags in query must be separated by comma.
        - name: not-tags
          in: query
          required: false
          schema:
            type: string
          description: A list of tags to filter the list result by. Resources that match all tags in this list will be excluded. Tags in query must be separated by comma.
        - name: not-tags-any
          in: query
          required: false
          schema:
            type: string
          description: A list of tags to filter the list result by. Resources that match any tag in this list will be excluded. Tags in query must be separated by comma.
        - name: fields
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: By using fields parameter, the API returns only the requested set of attributes. e.g. fields=id&fields=name
      responses:
        '200':
          description: >-
            Returns a list of all ports in the project, including port IDs, MAC
            addresses, fixed IPs, device IDs (server or router), status, and security
            groups. Supports extensive filtering.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPortsRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v2.0/ports/{port_id}:
    get:
      tags:
        - network
      summary: ポート詳細取得 (アイテム指定)
      description: |-
        ポート詳細を取得します。

        queryに"fields"を指定してレスポンス内容をフィルタリング可能です。

      operationId: network/show-ports
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/PortIdPath'
        - in: query
          name: fields
          schema:
            type: string
          required: false
          description: By using fields parameter, the API returns only the requested set of attributes. e.g. fields=id&fields=name
      responses:
        '200':
          description: >-
            Returns the details of a specific port, including ID, MAC address, fixed
            IPs, device ID, device owner, status, and security groups.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortRes'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags:
        - network
      summary: ポート更新
      description: |-
        ポートのセキュリティグループを変更したり、IPアドレスを指定したり、帯域を変更したりする際に利用します。

        Nameの変更を行うことはできません。

        指定したパラメータの値のみ更新されます。

