  /v1/AUTH_{project_id}:
    get:
      tags:
        - object-storage
      summary: アカウント情報及びコンテナ一覧取得
      description: アカウントの詳細を表示し、アカウント内のコンテナを名前順に一覧表示します。
      operationId: object-storage/get-account-metadata
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: query
          name: limit
          schema:
            type: integer
          required: false
          description: For an integer value n, limits the number of results to n.
        - in: query
          name: marker
          schema:
            type: string
          required: false
          description: For a string value x, constrains the list to items whose names are greater than x.
        - in: query
          name: end_marker
          schema:
            type: string
          required: false
          description: For a string value x, constrains the list to items whose names are less than x.
        - in: query
          name: format
          schema:
            type: string
          required: false
          description: The response format. Valid values are json, xml, or plain.
        - in: query
          name: prefix
          schema:
            type: string
          required: false
          description: Only objects with this prefix will be returned. When combined with a delimiter query, this enables API users to simulate and traverse the objects in a container as if they were in a directory tree.
        - in: query
          name: delimiter
          schema:
            type: string
          required: false
          description: The delimiter is a single character used to split object names to present a pseudo-directory hierarchy of objects. When combined with a prefix query, this enables API users to simulate and traverse the objects in a container as if they were in a directory tree.
        - in: query
          name: reverse
          schema:
            type: boolean
          required: false
          description: By default, listings are returned sorted by name, ascending. If you include the reverse=true query parameter, the listing will be returned sorted by name, descending.
      responses:
        '200':
          description: >-
            Returns the account details and a list of containers sorted by name,
            including container names, object counts, and byte usage.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetObjectStorageAccountMetadataRes'
    head:
      tags:
        - object-storage
      summary: アカウント詳細取得
      description: アカウントのメタデータを取得します。レスポンスボディは返りません。
      operationId: object-storage/head-account
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      responses:
        '204':
          description: >-
            Returns account metadata in response headers only (no body). Headers include
            X-Account-Container-Count, X-Account-Object-Count, and X-Account-Bytes-Used.
          headers:
            X-Account-Container-Count:
              schema:
                type: integer
              description: The number of containers in the account.
            X-Account-Object-Count:
              schema:
                type: integer
              description: The number of objects in the account.
            X-Account-Bytes-Used:
              schema:
                type: integer
              description: The total number of bytes that are stored in Object Storage for the account.
    post:
      tags:
        - object-storage
      summary: アカウントメタデータの作成・更新・削除
      description: |-
        オブジェクトストレージの保存容量変更や、一時URL機能等を設定することができます。
        また、クエリパラメータに bulk-delete=true を付けることでオブジェクトの一括削除が可能です。

        アカウントのクォータとして課金開始の設定

          * 仕様
              * 100GB単位で利用領域設定が可能です。

          * 注意点:
              * ヘッダーに `X-Account-Meta-Quota-Bytes` を直接設定することはできません。代わりに `X-Account-Meta-Quota-Giga-Bytes` を使用してください。
              * ヘッダーに `X-Remove-Account-Meta-Quota-Bytes` や `X-Remove-Account-Meta-Quota-Giga-Bytes` を設定することはできません。
              * `X-Account-Meta-Quota-Giga-Bytes` は100の倍数である必要があります。
              * `X-Account-Meta-Quota-Giga-Bytes` が設定されている場合、その値は現在のオブジェクトの総サイズよりも小さくてはなりません。

        一時的 Web 公開

          * 一時的にオブジェクトを公開する場合に、事前にキーを登録するために必要となります
          * キー登録時は `X-Account-Meta-Temp-URL-Key` ヘッダーを指定してください
          * キー削除時は以下のように指定してください。どの形式を用いても削除が可能です
            * `'X-Account-Meta-Temp-URL-Key;'`
            * `'X-Remove-Account-Meta-Temp-URL-Key;'`
            * `'X-Remove-Account-Meta-Temp-URL-Key: {任意の文字列}'`

        一括削除

          * 仕様
              * クエリパラメータに bulk-delete=true を付けること
              * ヘッダーに `Content-Type: text/plain` を付けること
              * リクエストボディは改行で区切り、最大 10000 件まで含めることが可能
              * オブジェクトを指定する場合 CONTAINER_NAME/OBJECT_NAME の形式とすること
              * コンテナを指定する場合 CONTAINER_NAME とし、コンテナは空であること
              * リクエストボディの文字列は UTF-8 エンコードし、その後 URL エンコードすること

          * 注意点
              * アカウントのクォータとして課金開始の設定と一括削除を同時に実行することはできません

      operationId: object-storage/create-account-metadata
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: header
          name: X-Account-Meta-Quota-Giga-Bytes
          schema:
            type: number
          required: false
          description: クォータ設定時に使用します
        - in: header
          name: X-Account-Meta-Temp-URL-Key
          schema:
            type: string
          required: false
          description: 一時URL作成のためのキーを登録する際に使用します
        - in: header
          name: X-Remove-Account-Meta-Temp-URL-Key
          schema:
            type: string
          required: false
          description: 一時URL作成のためのキーを削除する際に使用します
        - in: header
          name: X-Account-Meta-Quota-Bytes
          schema:
            type: number
          required: false
          description: 使用できません 代わりに`X-Account-Meta-Quota-Giga-Bytes`を使用してください
        - in: header
          name: X-Remove-Account-Meta-Quota-Giga-Bytes
          schema:
            type: number
          required: false
          description: 使用できません 代わりに`X-Account-Meta-Quota-Giga-Bytes`を使用してください
        - in: header
          name: X-Remove-Account-Meta-Quota-Bytes
          schema:
            type: number
          required: false
          description: 使用できません 代わりに`X-Account-Meta-Quota-Giga-Bytes`を使用してください
        - in: query
          name: bulk-delete
          schema:
            type: boolean
          required: false
          description: POST や DELETE 処理のパスに bulk-delete パラメーターを追加して、一括削除処理を実行します。 https://docs.openstack.org/ja/user-guide/cli-swift-bulk-delete.html
      requestBody:
        required: false
        content:
          text/plain:
            schema:
              type: string
      responses:
        '200':
          description: >-
            The bulk delete operation completed. Returns a summary of deleted
            objects/containers and any errors encountered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteRes'
        '204':
          description: >-
            The account metadata has been updated (e.g., quota or temp-URL key). No
            content is returned.

  /v1/AUTH_{project_id}/{container_name}:
    get:
      tags:
        - object-storage
      summary: コンテナ内オブジェクト一覧取得
      description: 指定したコンテナ内のオブジェクトを一覧表示します。
      operationId: object-storage/list-objects
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: container_name
          schema:
            type: string
          required: true
          description: The name of the container.
        - in: query
          name: limit
          schema:
            type: integer
          required: false
          description: For an integer value n, limits the number of results to n.
        - in: query
          name: marker
          schema:
            type: string
          required: false
          description: For a string value x, constrains the list to items whose names are greater than x.
        - in: query
          name: end_marker
          schema:
            type: string
          required: false
          description: For a string value x, constrains the list to items whose names are less than x.
        - in: query
          name: format
          schema:
            type: string
          required: false
          description: The response format. Valid values are json, xml, or plain.
        - in: query
          name: prefix
          schema:
            type: string
          required: false
          description: Only objects with this prefix will be returned.
        - in: query
          name: delimiter
          schema:
            type: string
          required: false
          description: The delimiter is a single character used to split object names to present a pseudo-directory hierarchy of objects.
        - in: query
          name: path
          schema:
            type: string
          required: false
          description: For a string value x, returns the object names nested in the pseudo path.
        - in: query
          name: reverse
          schema:
            type: boolean
          required: false
          description: By default, listings are returned sorted by name, ascending. If you include the reverse=true query parameter, the listing will be returned sorted by name, descending.
      responses:
        '200':
          description: >-
            Returns a list of objects in the specified container, including object
            names, content types, sizes (bytes), hashes, and last modified timestamps.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListObjectsRes'
        '204':
          description: Request was successful (no content).
    head:
      tags:
        - object-storage
      summary: コンテナ詳細取得
      description: 指定したコンテナのメタデータを取得します。レスポンスボディは返りません。
      operationId: object-storage/head-container
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: container_name
          schema:
            type: string
          required: true
          description: The name of the container.
      responses:
        '204':
          description: >-
            Returns container metadata in response headers only (no body). Headers
            include X-Container-Object-Count and X-Container-Bytes-Used.
          headers:
            X-Container-Object-Count:
              schema:
                type: integer
              description: The number of objects in the container.
            X-Container-Bytes-Used:
              schema:
                type: integer
              description: The total number of bytes that are stored in Object Storage for the container.
    put:
      tags:
        - object-storage
      summary: コンテナ作成
      description: |-
        コンテナを作成します。

        バージョン管理を有効にする場合は `X-Versions-Location` ヘッダーに履歴保存先コンテナ名を指定してください。

        Web公開設定については `POST /v1/AUTH_{project_id}/{container_name}` を参照してください。
      operationId: object-storage/create-container
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: container_name
          schema:
            type: string
          required: true
          description: The name of the container.
        - in: header
          name: X-Versions-Location
          schema:
            type: string
          required: false
          description: Enables versioning on this container. The value is the name of another container. You must UTF-8-encode and then URL-encode the name before you include it in the header.
      responses:
        '201':
          description: Container was created.
        '202':
          description: Request was successful (container already exists).
    delete:
      tags:
        - object-storage
      summary: コンテナ削除
      description: 指定したコンテナを削除します。コンテナが空である必要があります。
      operationId: object-storage/delete-container
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: container_name
          schema:
            type: string
          required: true
          description: The name of the container.
      responses:
        '204':
          description: >-
            The container has been deleted. The container must be empty before deletion.
            No content is returned.
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict. The container is not empty.
    post:
      tags:
        - object-storage
      summary: コンテナメタデータ設定・Web公開設定
      description: |-
        コンテナのメタデータを設定・更新・削除します。

        Web公開設定:

          * `X-Container-Meta-Web-Index` にインデックスファイル名（例: `index.html`）を設定することで静的Webサイトとして公開できます。
          * `X-Container-Meta-Web-Listings` を `true` に設定するとオブジェクト一覧をHTMLで表示します。
          * `X-Container-Read` に `.r:*` を設定すると全ユーザーが読み取り可能になります。
      operationId: object-storage/post-container-metadata
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: container_name
          schema:
            type: string
          required: true
          description: The name of the container.
        - in: header
          name: X-Container-Read
          schema:
            type: string
          required: false
          description: Sets a container access control list (ACL) that grants read access. For example, `.r:*` grants read access to all.
        - in: header
          name: X-Container-Write
          schema:
            type: string
          required: false
          description: Sets a container write access control list (ACL) that grants write access.
        - in: header
          name: X-Container-Meta-Web-Index
          schema:
            type: string
          required: false
          description: Sets the index file for static website hosting. For example, `index.html`.
        - in: header
          name: X-Container-Meta-Web-Listings
          schema:
            type: boolean
          required: false
          description: Set to `true` to enable directory listing for static website hosting.
        - in: header
          name: X-Container-Meta-Web-Listings-CSS
          schema:
            type: string
          required: false
          description: Sets a custom CSS stylesheet for web listings.
        - in: header
          name: X-Container-Meta-Web-Error
          schema:
            type: string
          required: false
          description: Sets a custom error file suffix for static website hosting. For example, `error.html`.
        - in: header
          name: X-Versions-Location
          schema:
            type: string
          required: false
          description: Enables versioning. The value is the name of another container where previous versions are stored.
        - in: header
          name: X-Remove-Versions-Location
          schema:
            type: string
          required: false
          description: Disables versioning by removing the X-Versions-Location header.
      responses:
        '204':
          description: >-
            The container metadata has been updated (e.g., web hosting settings,
            versioning, ACL). No content is returned.

  /v1/AUTH_{project_id}/{container_name}/{object_name}:
    get:
      tags:
        - object-storage
      summary: オブジェクトダウンロード
      description: 指定したオブジェクトのデータをダウンロードします。
      operationId: object-storage/get-object
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: container_name
          schema:
            type: string
          required: true
          description: The name of the container.
        - in: path
          name: object_name
          schema:
            type: string
          required: true
          description: The name of the object.
        - in: header
          name: Range
          schema:
            type: string
          required: false
          description: "Partial content request. For example: `bytes=0-1023`."
      responses:
        '200':
          description: >-
            Returns the object data as binary content. The Content-Type header reflects
            the object's MIME type.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - object-storage
      summary: オブジェクトアップロード
      description: |-
        指定したコンテナにオブジェクトをアップロードします。

        Dynamic Large Object (DLO) を作成する場合は `X-Object-Manifest` ヘッダーにセグメントのプレフィックスを指定してください。（例: `container/prefix`）
      operationId: object-storage/put-object
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: container_name
          schema:
            type: string
          required: true
          description: The name of the container.
        - in: path
          name: object_name
          schema:
            type: string
          required: true
          description: The name of the object.
        - in: header
          name: Content-Type
          schema:
            type: string
          required: false
          description: Sets the MIME type for the object.
        - in: header
          name: ETag
          schema:
            type: string
          required: false
          description: The MD5 checksum value of the request body. Lets the Object Storage service verify that the object was not corrupted during upload.
        - in: header
          name: X-Delete-At
          schema:
            type: integer
          required: false
          description: The date and time in UNIX Epoch time stamp format when the system removes the object.
        - in: header
          name: X-Delete-After
          schema:
            type: integer
          required: false
          description: The number of seconds after which the system removes the object. Internally, this header is stored as X-Delete-At.
        - in: header
          name: X-Object-Manifest
          schema:
            type: string
          required: false
          description: Set to create a Dynamic Large Object (DLO). The value is `{container}/{prefix}` where container is the segments container and prefix is the prefix for segment objects.
        - in: query
          name: multipart-manifest
          schema:
            type: string
            enum: [put]
          required: false
          description: Set to `put` to create a Static Large Object (SLO). The request body must be a JSON manifest of segments.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
          application/json:
            schema:
              $ref: '#/components/schemas/SloManifest'
      responses:
        '201':
          description: Object was created.
        '202':
          description: Request was successful (object updated).
    delete:
      tags:
        - object-storage
      summary: オブジェクト削除
      description: 指定したオブジェクトを削除します。
      operationId: object-storage/delete-object
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: container_name
          schema:
            type: string
          required: true
          description: The name of the container.
        - in: path
          name: object_name
          schema:
            type: string
          required: true
          description: The name of the object.
        - in: header
          name: X-If-Delete-At
          schema:
            type: integer
          required: false
          description: A Unix timestamp in which the object will be deleted. If not specified, the object is deleted immediately.
      responses:
        '204':
          description: >-
            The object has been deleted. No content is returned.
        '404':
          $ref: '#/components/responses/NotFound'
    copy:
      tags:
        - object-storage
      summary: オブジェクトコピー
      description: |-
        指定したオブジェクトを別のオブジェクトにコピーします。

        `Destination` ヘッダーにコピー先を `/{container}/{object}` の形式で指定してください。
      operationId: object-storage/copy-object
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: container_name
          schema:
            type: string
          required: true
          description: The name of the source container.
        - in: path
          name: object_name
          schema:
            type: string
          required: true
          description: The name of the source object.
        - in: header
          name: Destination
          schema:
            type: string
          required: true
          description: "The container and object name of the destination object in the format: `/{container}/{object}`."
        - in: header
          name: Destination-Account
          schema:
            type: string
          required: false
          description: Destination account name. When specified, the object is copied to this account.
        - in: header
          name: Content-Type
          schema:
            type: string
          required: false
          description: Sets the MIME type for the new object.
      responses:
        '201':
          description: Object was copied.
    post:
      tags:
        - object-storage
      summary: オブジェクトメタデータ更新・削除予約
      description: |-
        オブジェクトのメタデータを更新します。

        オブジェクトの削除予約:

          * `X-Delete-At` に削除する日時（Unixタイムスタンプ）を指定します。
          * `X-Delete-After` に削除までの秒数を指定します。
      operationId: object-storage/post-object-metadata
      security:
        - KeystoneTokenAuthentication: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - in: path
          name: container_name
          schema:
            type: string
          required: true
          description: The name of the container.
        - in: path
          name: object_name
          schema:
            type: string
          required: true
          description: The name of the object.
        - in: header
          name: X-Delete-At
          schema:
            type: integer
          required: false
          description: The date and time in UNIX Epoch time stamp format when the system removes the object.
        - in: header
          name: X-Delete-After
          schema:
            type: integer
          required: false
          description: The number of seconds after which the system removes the object.
        - in: header
          name: Content-Type
          schema:
            type: string
          required: false
          description: Sets the MIME type for the object.
      responses:
        '202':
          description: >-
            The object metadata update has been accepted (e.g., scheduled deletion via
            X-Delete-At/X-Delete-After, or Content-Type change).
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/domains:
    get:
